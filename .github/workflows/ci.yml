name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
      - run: go mod download
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          verify: false

  js-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/challenge/package-lock.json
      - working-directory: web/challenge
        run: npm ci
      - working-directory: web/challenge
        run: npm run build
      - working-directory: web/challenge
        run: npm test
      - name: Bundle size budget (60KB)
        run: |
          size=$(stat -c %s web/challenge/dist/challenge.bundle.js)
          echo "bundle size: $size bytes"
          test $size -le 61440 || (echo "bundle exceeds 60KB"; exit 1)

  sdk-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: sdk/node/package-lock.json
      - working-directory: sdk/node
        run: npm ci
      - working-directory: sdk/node
        run: npm run build
      - working-directory: sdk/node
        run: npm test

  sdk-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - working-directory: sdk/python
        run: pip install -e ".[dev]"
      - working-directory: sdk/python
        run: pytest

  adversarial-e2e:
    runs-on: ubuntu-latest
    needs: [go, js-bundle]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build JS challenge bundle
        working-directory: web/challenge
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/challenge.bundle.js ../../internal/challenge/assets/
      - name: Build daemon
        run: go build -o bin/antiscrapling ./cmd/antiscrapling
      - name: Install Python attacker deps
        run: pip install pytest httpx curl-cffi requests playwright scrapling browserforge
      - name: Start dummy upstream
        run: |
          mkdir -p /tmp/upstream
          (cd /tmp/upstream && python3 -m http.server 3300 &)
          sleep 1
      - name: Start daemon
        env:
          AS_TARGET: http://127.0.0.1:3300
          AS_TOKEN_SECRET_FILE: /tmp/as_token.key
        run: |
          ./bin/antiscrapling --config policies/default.yaml &
          sleep 3
          curl -fsS http://localhost:9091/healthz
      - name: Run adversarial scenarios
        env:
          DAEMON_URL: http://localhost:8080
        run: python3 -m pytest -v tests/scrapling/scenarios/
