# nginx/sidecar.conf
#
# Sidecar pattern: nginx stays in charge of routing and TLS.
# anti-scrapling runs as an auth sub-service that nginx consults
# before forwarding each request to the real backend.
#
# Traffic flow:
#   client -> nginx:443 -> auth_request -> anti-scrapling:8080/v1/decide
#                       -> (200) -> backend upstream
#                       -> (401/403) -> anti-scrapling challenge page
#
# NOTE: The /v1/decide endpoint is planned for anti-scrapling v1.1.
# Until that ships, this config will not work end-to-end. The rest of
# the plumbing is correct and ready to activate once the endpoint exists.
#
# Trade-offs vs standalone:
#   + nginx keeps full control of routing, caching, and rate-limiting
#   + You can apply different auth rules per location block
#   + Easier to add anti-scrapling to an existing nginx deployment
#   - Two hops per request (nginx -> AS -> nginx -> backend)
#   - Challenge pages must be proxied back through nginx (see @challenge)
#   - auth_request strips the response body; the challenge page needs
#     a separate proxy_pass to render correctly
#
# Prerequisites:
#   - anti-scrapling daemon running on 127.0.0.1:8080
#   - anti-scrapling v1.1+ (for /v1/decide)

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream backend {
        server 127.0.0.1:3000;
        keepalive 32;
    }

    upstream antiscrapling {
        server 127.0.0.1:8080;
        keepalive 32;
    }

    server {
        listen 443 ssl http2;
        server_name example.com;

        ssl_certificate     /etc/nginx/ssl/example.com.crt;
        ssl_certificate_key /etc/nginx/ssl/example.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;

        # Main location: check every request with anti-scrapling first.
        location / {
            auth_request /__as_check;

            # On auth failure, jump to the @challenge named location
            # which proxies the full challenge page from anti-scrapling.
            error_page 401 403 = @challenge;

            # Forward to the real backend only after AS clears the request.
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Internal sub-request location. nginx sends a POST to /v1/decide
        # with the original request metadata. anti-scrapling returns:
        #   200 -> allow
        #   401 -> challenge (browser, unknown)
        #   403 -> block (known bad actor)
        #
        # auth_request only passes the response status, not the body.
        # That's why we need the separate @challenge location below.
        location = /__as_check {
            internal;

            proxy_pass         http://antiscrapling/v1/decide;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Pass the original request details so AS can fingerprint properly.
            proxy_set_header X-Original-URI    $request_uri;
            proxy_set_header X-Original-Method $request_method;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header Host              $host;

            # auth_request ignores the body, so we don't need to forward it.
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
        }

        # Named location that renders the challenge or block page.
        # anti-scrapling returns the full HTML/JS challenge here.
        location @challenge {
            proxy_pass         http://antiscrapling;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Expose anti-scrapling's metrics endpoint internally only.
        # Remove this block if you scrape metrics from the host directly.
        location /metrics {
            allow 127.0.0.1;
            deny  all;
            proxy_pass http://127.0.0.1:9090/metrics;
        }
    }

    server {
        listen 80;
        server_name example.com;
        return 301 https://$host$request_uri;
    }
}
