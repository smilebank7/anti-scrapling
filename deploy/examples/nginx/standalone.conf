# nginx/standalone.conf
#
# Standalone pattern: nginx is the TLS terminator only.
# anti-scrapling sits behind nginx and IS the effective front door.
# All bot detection, fingerprinting, and challenge logic runs inside
# the anti-scrapling daemon. nginx's only job is to unwrap TLS and
# pass the real client IP through.
#
# Traffic flow:
#   client -> nginx:443 (TLS) -> anti-scrapling:8080 -> upstream
#
# Trade-offs vs sidecar:
#   + Simpler config: no auth_request plumbing
#   + anti-scrapling controls the full response (challenges, redirects)
#   + Works with any upstream; nginx doesn't need to know about it
#   - nginx can't apply its own rate-limiting or WAF rules before AS sees traffic
#   - Replacing anti-scrapling requires touching nginx config
#
# Prerequisites:
#   - TLS cert at /etc/nginx/ssl/example.com.{crt,key}
#   - anti-scrapling daemon running on 127.0.0.1:8080

# Tune worker count to match CPU cores.
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Pass the real client IP to anti-scrapling so it can do IP-based
    # reputation checks. Without this, AS sees nginx's loopback address.
    set_real_ip_from 127.0.0.1;
    real_ip_header   X-Forwarded-For;

    # Keep connections to anti-scrapling alive to avoid per-request
    # TCP handshake overhead. Tune keepalive to match your concurrency.
    upstream antiscrapling {
        server 127.0.0.1:8080;
        keepalive 64;
    }

    server {
        listen 443 ssl http2;
        server_name example.com;

        ssl_certificate     /etc/nginx/ssl/example.com.crt;
        ssl_certificate_key /etc/nginx/ssl/example.com.key;

        # Modern TLS only. Drop TLS 1.0/1.1 unless you have legacy clients.
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers   HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://antiscrapling;
            proxy_http_version 1.1;

            # Required for keepalive upstream connections.
            proxy_set_header Connection "";

            # Tell anti-scrapling who the real client is.
            proxy_set_header X-Real-IP        $remote_addr;
            proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Preserve the original Host so anti-scrapling can apply
            # per-domain policy rules.
            proxy_set_header Host $host;

            # Give anti-scrapling enough time to run its checks and
            # potentially serve a JS challenge page.
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }
    }

    # Redirect plain HTTP to HTTPS.
    server {
        listen 80;
        server_name example.com;
        return 301 https://$host$request_uri;
    }
}
