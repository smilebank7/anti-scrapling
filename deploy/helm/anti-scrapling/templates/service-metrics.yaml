{{- if .Values.metrics.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "anti-scrapling.fullname" . }}-metrics
  labels:
    {{- include "anti-scrapling.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "anti-scrapling.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.service.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
