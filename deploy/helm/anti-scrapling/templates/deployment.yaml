apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "anti-scrapling.fullname" . }}
  labels:
    {{- include "anti-scrapling.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "anti-scrapling.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "anti-scrapling.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          args:
            - --config=/etc/anti-scrapling/policy.yaml
          env:
            - name: AS_TARGET
              value: {{ .Values.upstream.target | quote }}
            - name: AS_TOKEN_SECRET_FILE
              value: /etc/anti-scrapling/token.key
            {{- if .Values.redis.enabled }}
            - name: AS_REDIS_URL
              value: {{ .Values.redis.url | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: admin
              containerPort: 9091
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: policy
              mountPath: /etc/anti-scrapling/policy.yaml
              subPath: policy.yaml
              readOnly: true
            - name: token
              mountPath: /etc/anti-scrapling/token.key
              subPath: {{ .Values.token.secretKey }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: policy
          configMap:
            name: {{ include "anti-scrapling.configmapName" . }}
        - name: token
          secret:
            secretName: {{ include "anti-scrapling.tokenSecretName" . }}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
