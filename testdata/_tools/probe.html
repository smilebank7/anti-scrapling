<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anti-Scrapling Dev Probe</title>
<style>
body { font-family: monospace; padding: 1rem; background: #111; color: #e0e0e0; }
h1 { color: #4fc3f7; font-size: 1.2rem; }
pre { background: #1e1e1e; border: 1px solid #333; padding: 0.75rem; overflow-x: auto; font-size: 0.75rem; max-height: 80vh; }
button { background: #4fc3f7; color: #111; border: none; padding: 0.5rem 1rem; cursor: pointer; margin-right: 0.5rem; }
button:hover { background: #29b6f6; }
a { color: #80cbc4; }
.warn { color: #ffb74d; }
</style>
</head>
<body>
<h1>Anti-Scrapling Fingerprint Probe (Dev Tool)</h1>
<p class="warn">Developer tool only — NOT the production challenge bundle. Vanilla JS, no build step.</p>
<button id="run">Run All Probes</button>
<button id="download" disabled>Download JSON</button>
<pre id="output">Click "Run All Probes"...</pre>

<script src="probe.js"></script>
<script>
document.getElementById('run').addEventListener('click', async () => {
    const out = document.getElementById('output');
    out.textContent = 'Running probes...';
    try {
        const report = await runAllProbes();
        const json = JSON.stringify(report, null, 2);
        out.textContent = json;
        const btn = document.getElementById('download');
        btn.disabled = false;
        btn.onclick = () => {
            const blob = new Blob([json], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'fingerprint_report.json';
            a.click();
        };
    } catch (e) {
        out.textContent = 'Error: ' + e.message + '\n' + e.stack;
    }
});
</script>
</body>
</html>
